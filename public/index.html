<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Ads Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .wrap { max-width: 1100px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .brand {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    button {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.78rem;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: inherit;
    }
    button:hover { border-color: #666; color: #eee; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.primary { border-color: #4a5; color: #cfd; }
    button.primary:hover { background: #1a2a1a; }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th {
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      padding: 0 0.5rem 0.75rem;
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }
    th.num, td.num { text-align: right; }
    td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid #1a1a1a;
      color: #bbb;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #181818; }

    .target-name { color: #e8e8e8; font-weight: 500; }
    .target-id   { color: #555; font-size: 0.72rem; font-family: ui-monospace, monospace; }

    .count-big { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .count-date { color: #555; font-size: 0.72rem; }

    .diff-up   { color: #4ade80; font-weight: 600; }
    .diff-down { color: #f87171; font-weight: 600; }
    .diff-zero { color: #666; }
    .diff-na   { color: #333; font-style: italic; }

    td.actions { width: 1%; white-space: nowrap; text-align: right; }

    .skeleton {
      display: inline-block;
      background: #222;
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
      width: 50px; height: 0.9rem;
    }
    @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }

    details.errors summary {
      cursor: pointer;
      user-select: none;
      list-style: none;
      color: #888;
      font-size: 0.78rem;
    }
    details.errors summary::-webkit-details-marker { display: none; }
    details.errors[open] summary { margin-bottom: 0.75rem; color: #ccc; }
    .err-row {
      padding: 0.6rem 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.8rem;
      font-family: ui-monospace, monospace;
    }
    .err-row:last-child { border-bottom: none; }
    .err-meta { color: #666; font-size: 0.72rem; margin-bottom: 0.25rem; }
    .err-msg  { color: #f87171; word-break: break-word; white-space: pre-wrap; }

    .flash { color: #4ade80; font-size: 0.75rem; margin-left: 0.5rem; }
    .flash.err { color: #f87171; }

    /* Weekly report card body — give the AI-rendered HTML proper hierarchy */
    #weekly-meta {
      font-size: 0.78rem;
      color: #777;
      margin-bottom: 1rem;
      line-height: 1.7;
    }
    #weekly-meta strong { color: #cfcfcf; font-weight: 600; }
    #weekly-body {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #d8d8d8;
    }
    #weekly-body h3 {
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      margin: 1.6rem 0 0.7rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid #2a2a2a;
    }
    #weekly-body h3:first-child { margin-top: 0; }
    #weekly-body h4 {
      font-size: 0.83rem;
      font-weight: 600;
      color: #cfd;
      margin: 1.1rem 0 0.4rem;
      padding: 0.5rem 0.75rem;
      background: #181d18;
      border-left: 3px solid #4a5;
      border-radius: 4px;
    }
    #weekly-body ul {
      margin: 0.3rem 0 0.8rem 0;
      padding-left: 1.4rem;
      list-style: none;
    }
    #weekly-body li {
      position: relative;
      margin: 0.35rem 0;
      padding-left: 0.2rem;
    }
    #weekly-body li::before {
      content: '·';
      position: absolute;
      left: -0.9rem;
      top: -0.05rem;
      color: #555;
      font-weight: 700;
    }
    #weekly-body strong { color: #f5f5f5; font-weight: 600; }
    #weekly-body p { margin: 0.5rem 0; }
    /* Highlight the rotation/total-change paired bullets the AI emits */
    #weekly-body h4 + ul li:first-child::before { color: #4ade80; }

    /* History modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1.5rem;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: #161616;
      border: 1px solid #333;
      border-radius: 14px;
      width: 100%;
      max-width: 720px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid #222;
    }
    .modal-header h3 {
      font-size: 0.95rem;
      color: #e8e8e8;
      font-weight: 600;
      margin: 0;
    }
    .modal-header .meta {
      font-size: 0.72rem;
      color: #666;
      margin-top: 0.2rem;
    }
    .modal-close {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .modal-close:hover { border-color: #666; color: #ddd; }
    .modal-body {
      padding: 1.2rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    #history-chart {
      width: 100%;
      height: 140px;
      margin-bottom: 1rem;
    }
    #history-chart svg { width: 100%; height: 100%; display: block; }
    .history-table {
      width: 100%;
      font-size: 0.84rem;
    }
    .history-table th, .history-table td {
      padding: 0.4rem 0.6rem;
    }
    .history-table th {
      font-size: 0.66rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #222;
    }
    .history-table td {
      border-bottom: 1px solid #1a1a1a;
      color: #ccc;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .history-table .delta-up { color: #4ade80; }
    .history-table .delta-down { color: #f87171; }
    .history-table .delta-zero { color: #555; }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #333;
      text-align: center;
      line-height: 1.7;
    }
    footer a { color: #555; }
  </style>
</head>
<body>
<div class="wrap">

<header>
  <span class="brand">FB Ads Monitor</span>
  <div>
    <button id="refresh">↻ Refresh</button>
  </div>
</header>

<div class="card">
  <h2>Active ads (HK) per target</h2>
  <table>
    <thead>
      <tr>
        <th>Target</th>
        <th class="num">Current</th>
        <th class="num">1D</th>
        <th class="num">7D</th>
        <th class="num">14D</th>
        <th class="num">30D</th>
        <th class="num">60D</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#555">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="card" id="weekly-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
    <h2 style="margin:0">📊 Weekly competitor report</h2>
    <button id="regen-weekly" title="Re-run AI on the latest creatives in storage (~30 seconds)">🔄 Regenerate now</button>
    <button id="regen-weekly-banana" title="Fallback when Gemini is blocked — runs the report through Banana2556 (claude-haiku-4.5-as)">🍌 Regenerate via Banana2556</button>
  </div>
  <div id="weekly-meta">Loading…</div>
  <div id="weekly-body"></div>
</div>

<div class="card">
  <details class="errors" id="errors-details">
    <summary>
      <span id="errors-summary">Recent errors — loading…</span>
    </summary>
    <div id="errors-body"></div>
  </details>
</div>

<div id="history-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <div class="modal-header">
      <div>
        <h3 id="history-title">Target history</h3>
        <div class="meta" id="history-meta"></div>
      </div>
      <button class="modal-close" id="history-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div id="history-chart"></div>
      <table class="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th class="num">Count</th>
            <th class="num">Δ vs prev</th>
            <th>Fetched (UTC)</th>
          </tr>
        </thead>
        <tbody id="history-rows"></tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  Hourly cron HKT 09:30-17:30 (once per target per day) &nbsp;·&nbsp;
  Source: <a href="https://www.facebook.com/ads/library/" target="_blank">Meta Ad Library</a>
  &nbsp;·&nbsp; <span id="gen-at"></span>
</footer>

</div><!-- /wrap -->

<script>
  const fmtNum = (n) => n === null || n === undefined ? '—' : n.toLocaleString();
  const fmtDate = (d) => {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y.slice(2)}`;
  };
  const fmtTime = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  };

  function fmtDiffCell(d) {
    if (!d || d.diff === null || d.diff === undefined) {
      return '<span class="diff-na">—</span>';
    }
    const sign = d.diff > 0 ? '+' : '';
    const pctStr = d.pct !== null && d.pct !== undefined
      ? ` <span style="opacity:0.65">(${d.pct > 0 ? '+' : ''}${d.pct}%)</span>`
      : '';
    const cls = d.diff > 0 ? 'diff-up' : d.diff < 0 ? 'diff-down' : 'diff-zero';
    const baseline = d.baseline_count !== null && d.baseline_count !== undefined
      ? `<div class="count-date">${fmtNum(d.baseline_count)}</div>`
      : '';
    return `${baseline}<span class="${cls}">${sign}${d.diff}${pctStr}</span>`;
  }

  function renderRow(t) {
    const diffsByLabel = Object.fromEntries((t.diffs || []).map((d) => [d.label, d]));
    const adLib = `https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=HK&view_all_page_id=${t.id}`;
    const updatedAt = fmtTime(t.current && t.current.fetched_at_utc);
    const current = t.current
      ? `<div class="count-big">${fmtNum(t.current.count)}</div>
         <div class="count-date">${fmtDate(t.current.date)}${updatedAt ? ` · ${updatedAt}` : ''}</div>`
      : `<div class="diff-na">no data</div>`;
    return `
      <tr data-id="${t.id}">
        <td>
          <div class="target-name">
            <a href="${adLib}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted #333">${t.name}</a>
          </div>
          <div class="target-id">${t.id}</div>
        </td>
        <td class="num">${current}</td>
        <td class="num">${fmtDiffCell(diffsByLabel['1D'])}</td>
        <td class="num">${fmtDiffCell(diffsByLabel['7D'])}</td>
        <td class="num">${fmtDiffCell(diffsByLabel['14D'])}</td>
        <td class="num">${fmtDiffCell(diffsByLabel['30D'])}</td>
        <td class="num">${fmtDiffCell(diffsByLabel['60D'])}</td>
        <td class="actions">
          <button class="history-btn" data-id="${t.id}" data-name="${t.name.replace(/"/g, '&quot;')}" title="View full history">
            📈 History
          </button>
          <button class="fetch-btn" data-id="${t.id}" data-name="${t.name.replace(/"/g, '&quot;')}">
            ↻ Fetch now
          </button>
          <span class="flash" data-flash="${t.id}"></span>
        </td>
      </tr>`;
  }

  function renderErrors(errors) {
    const summary = document.getElementById('errors-summary');
    const body = document.getElementById('errors-body');
    if (!errors || errors.length === 0) {
      summary.textContent = 'Recent errors — none ✨';
      body.innerHTML = '';
      return;
    }
    summary.textContent = `Recent errors — ${errors.length}`;
    body.innerHTML = errors.map((e) => `
      <div class="err-row">
        <div class="err-meta">
          ${new Date(e.ts).toLocaleString()} ·
          ${e.name || '(no target)'} ·
          ${e.page_id || ''} ·
          stage: ${e.stage || '?'}
          ${e.took_ms ? ` · ${e.took_ms}ms` : ''}
        </div>
        <div class="err-msg">${(e.error || '').toString().replace(/</g, '&lt;')}</div>
      </div>
    `).join('');
  }

  async function fetchData() {
    const res = await fetch(`/api/data?t=${Date.now()}`, { cache: 'no-store' });
    if (res.status === 401) {
      // Session expired — bounce to login.
      window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
      return new Promise(() => {});
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function load() {
    const btn = document.getElementById('refresh');
    btn.disabled = true;
    try {
      const data = await fetchData();
      document.getElementById('rows').innerHTML =
        (data.targets || []).map(renderRow).join('') ||
        '<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#555">No targets configured</td></tr>';
      renderErrors(data.errors || []);
      document.getElementById('gen-at').textContent =
        data.generated_at ? `Updated ${new Date(data.generated_at).toLocaleTimeString()}` : '';
    } catch (e) {
      document.getElementById('rows').innerHTML =
        `<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#f87171">Failed to load: ${e.message}</td></tr>`;
    } finally {
      btn.disabled = false;
    }
  }

  // Refresh just the errors panel without touching the rows table — so the
  // inline flash message next to the Fetch button stays visible.
  async function loadErrors() {
    try {
      const data = await fetchData();
      renderErrors(data.errors || []);
    } catch { /* silent — flash already shows the failure */ }
  }

  function flash(id, msg, isErr) {
    const el = document.querySelector(`[data-flash="${id}"]`);
    if (!el) return;
    el.textContent = msg;
    el.className = 'flash' + (isErr ? ' err' : '');
    if (!isErr) setTimeout(() => { el.textContent = ''; }, 4000);
  }

  async function fetchOne(id, name, btn) {
    btn.disabled = true;
    btn.textContent = '… fetching';
    flash(id, '');
    let ok = false;
    try {
      const res = await fetch(`/api/trigger?id=${encodeURIComponent(id)}`, { method: 'POST' });
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || body.detail || `HTTP ${res.status}`);
      flash(id, `✓ ${body.count} (${(body.tookMs / 1000).toFixed(1)}s)`);
      ok = true;
    } catch (e) {
      flash(id, `✗ ${e.message}`, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Fetch now';
      // On success we reload everything (count changed). On failure we
      // only refresh the errors panel so the inline flash survives.
      (ok ? load() : loadErrors()).catch(() => {});
    }
  }

  function renderHistoryChart(history) {
    const host = document.getElementById('history-chart');
    if (!history || history.length === 0) {
      host.innerHTML = '<div style="color:#555;font-size:0.78rem;padding:1rem">No data yet.</div>';
      return;
    }
    const w = 720, h = 140, padX = 30, padY = 16;
    const counts = history.map((r) => r.count);
    const minC = 0;
    const maxC = Math.max(...counts, 1);
    const xs = (i) => padX + (i / Math.max(history.length - 1, 1)) * (w - padX * 2);
    const ys = (c) => h - padY - ((c - minC) / Math.max(maxC - minC, 1)) * (h - padY * 2);
    const path = history.map((r, i) => `${i === 0 ? 'M' : 'L'}${xs(i).toFixed(1)},${ys(r.count).toFixed(1)}`).join(' ');
    const points = history.map((r, i) => `<circle cx="${xs(i).toFixed(1)}" cy="${ys(r.count).toFixed(1)}" r="2.5" fill="#4ade80"></circle>`).join('');
    const yTicks = [0, Math.round(maxC / 2), maxC]
      .map((v) => `<text x="4" y="${ys(v) + 4}" fill="#555" font-size="10">${v}</text>`).join('');
    host.innerHTML =
      `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">` +
      `<rect x="0" y="0" width="${w}" height="${h}" fill="transparent"/>` +
      yTicks +
      `<path d="${path}" fill="none" stroke="#4ade80" stroke-width="1.5"/>` +
      points +
      `</svg>`;
  }

  function renderHistoryRows(history) {
    const tbody = document.getElementById('history-rows');
    if (!history || history.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:1rem;color:#555">No snapshots yet.</td></tr>`;
      return;
    }
    // Newest first for the table.
    const desc = [...history].sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
    tbody.innerHTML = desc.map((row, i) => {
      const prev = desc[i + 1]; // older row
      let delta = '<span class="delta-zero">—</span>';
      if (prev) {
        const d = row.count - prev.count;
        const cls = d > 0 ? 'delta-up' : d < 0 ? 'delta-down' : 'delta-zero';
        const sign = d > 0 ? '+' : '';
        delta = `<span class="${cls}">${sign}${d}</span>`;
      }
      const fetchedAt = row.fetched_at_utc
        ? new Date(row.fetched_at_utc).toISOString().replace('T', ' ').replace(/\..+$/, '')
        : '—';
      return `<tr>
        <td>${row.date || '—'}</td>
        <td class="num">${fmtNum(row.count)}</td>
        <td class="num">${delta}</td>
        <td>${fetchedAt}</td>
      </tr>`;
    }).join('');
  }

  async function openHistory(id, name) {
    const modal = document.getElementById('history-modal');
    document.getElementById('history-title').textContent = name;
    document.getElementById('history-meta').textContent = 'Loading…';
    document.getElementById('history-chart').innerHTML = '';
    document.getElementById('history-rows').innerHTML = '';
    modal.classList.remove('hidden');

    try {
      const res = await fetch(`/api/history?id=${encodeURIComponent(id)}`, { cache: 'no-store' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      const hist = Array.isArray(data.history) ? data.history : [];
      const sortedAsc = [...hist].sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
      const first = sortedAsc[0];
      const last = sortedAsc[sortedAsc.length - 1];
      document.getElementById('history-meta').textContent = hist.length
        ? `${hist.length} snapshots · ${first?.date} → ${last?.date}`
        : 'No snapshots yet';
      renderHistoryChart(sortedAsc);
      renderHistoryRows(sortedAsc);
    } catch (e) {
      document.getElementById('history-meta').textContent = 'Failed: ' + e.message;
    }
  }

  function closeHistory() {
    document.getElementById('history-modal').classList.add('hidden');
  }

  async function loadWeeklyReport() {
    const meta = document.getElementById('weekly-meta');
    const body = document.getElementById('weekly-body');
    try {
      const res = await fetch('/api/weekly-report?t=' + Date.now(), { cache: 'no-store' });
      const data = await res.json();
      if (!data || !data.html) {
        meta.textContent = 'No weekly report yet — run the weekly workflow once.';
        body.innerHTML = '';
        return;
      }
      const stats = data.stats || {};
      const generatedAt = data.generated_at ? new Date(data.generated_at).toLocaleString() : '—';
      const fmtDelta = (d) => {
        if (!d || d.delta === undefined || d.delta === 0) return '—';
        const sign = d.delta > 0 ? '+' : '';
        return `${d.name} (${sign}${d.delta})`;
      };
      meta.innerHTML =
        `Week ${data.week || '?'} &nbsp;·&nbsp; ` +
        `Targets: <strong>${stats.targets ?? '?'}</strong> &nbsp;·&nbsp; ` +
        `New ads (rotation): <strong>${stats.new_ad_ids_total ?? '?'}</strong> &nbsp;·&nbsp; ` +
        `Dropped: <strong>${stats.removed_ad_ids_total ?? '?'}</strong> &nbsp;·&nbsp; ` +
        `Biggest gain: <strong>${fmtDelta(stats.biggest_gain)}</strong> &nbsp;·&nbsp; ` +
        `Biggest drop: <strong>${fmtDelta(stats.biggest_drop)}</strong> &nbsp;·&nbsp; ` +
        `Generated ${generatedAt}`;
      body.innerHTML = data.html;
    } catch (e) {
      meta.textContent = 'Weekly report fetch failed: ' + e.message;
      body.innerHTML = '';
    }
  }

  async function regenerateWeeklyReport(btn, provider) {
    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = '… AI 分析中（~30 秒）';
    try {
      const qs = provider ? `?provider=${encodeURIComponent(provider)}` : '';
      const res = await fetch('/api/weekly-report/regenerate' + qs, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ landing_diffs: [] }),
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) {
        throw new Error(data.error || ('HTTP ' + res.status));
      }
      await loadWeeklyReport();
      btn.textContent = '✓ 已更新';
      setTimeout(() => { btn.textContent = original; }, 2500);
    } catch (e) {
      alert('Regenerate failed: ' + e.message);
      btn.textContent = original;
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('regen-weekly').addEventListener('click', (e) => regenerateWeeklyReport(e.currentTarget));
  document.getElementById('regen-weekly-banana').addEventListener('click', (e) => regenerateWeeklyReport(e.currentTarget, 'banana2556'));
  document.getElementById('refresh').addEventListener('click', () => { load(); loadWeeklyReport(); });
  document.getElementById('rows').addEventListener('click', (e) => {
    const histBtn = e.target.closest('.history-btn');
    if (histBtn) {
      openHistory(histBtn.dataset.id, histBtn.dataset.name);
      return;
    }
    const fetchBtn = e.target.closest('.fetch-btn');
    if (fetchBtn) {
      fetchOne(fetchBtn.dataset.id, fetchBtn.dataset.name, fetchBtn);
    }
  });
  document.getElementById('history-close').addEventListener('click', closeHistory);
  document.getElementById('history-modal').addEventListener('click', (e) => {
    // Click backdrop to close.
    if (e.target.id === 'history-modal') closeHistory();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeHistory();
  });
  load();
  loadWeeklyReport();
</script>
</body>
</html>
