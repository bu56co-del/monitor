<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Ads Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .brand {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    button#refresh {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.8rem;
      padding: 0.35rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    button#refresh:hover { border-color: #666; color: #eee; }
    button#refresh:disabled { opacity: 0.4; cursor: default; }

    .card {
      width: 100%;
      max-width: 640px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1rem;
    }

    .count-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .count-value {
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      letter-spacing: -2px;
    }

    .count-meta {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #555;
    }
    .count-meta a { color: #555; text-decoration: none; border-bottom: 1px solid #333; }
    .count-meta a:hover { color: #999; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      padding: 0 0 0.75rem;
      border-bottom: 1px solid #222;
    }
    th:not(:first-child) { text-align: right; }

    td {
      padding: 0.75rem 0;
      border-bottom: 1px solid #1a1a1a;
      color: #bbb;
    }
    td:not(:first-child) { text-align: right; }
    tr:last-child td { border-bottom: none; }

    .window-label { color: #e8e8e8; font-weight: 500; }

    .diff-up   { color: #4ade80; font-weight: 600; }
    .diff-down { color: #f87171; font-weight: 600; }
    .diff-zero { color: #666; }
    .diff-na   { color: #444; font-style: italic; }

    .skeleton {
      display: inline-block;
      background: #222;
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      padding: 1rem 0;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #333;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <span class="brand">FB Ads Monitor</span>
  <button id="refresh">↻ Refresh</button>
</header>

<div class="card" id="count-card">
  <div class="count-label">Active Ads (HK)</div>
  <div class="count-value" id="count-val"><span class="skeleton" style="width:120px;height:4rem;display:inline-block"></span></div>
  <div class="count-meta" id="count-meta">&nbsp;</div>
</div>

<div class="card" id="diff-card">
  <table>
    <thead>
      <tr>
        <th>Period</th>
        <th>Baseline</th>
        <th>Change</th>
      </tr>
    </thead>
    <tbody id="diff-body">
      <tr><td colspan="3"><span class="skeleton" style="width:100%;height:1rem;display:block;margin:0.5rem 0"></span></td></tr>
    </tbody>
  </table>
</div>

<footer id="footer">Auto-updated daily at 10:00 HKT &nbsp;·&nbsp; Page&nbsp;<a style="color:#333;text-decoration:none;border-bottom:1px solid #2a2a2a" href="https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=HK&view_all_page_id=110379081699089" target="_blank">110379081699089</a></footer>

<script>
  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function fmtDiff(diff, pct) {
    if (diff === null) return '<span class="diff-na">n/a</span>';
    const sign = diff > 0 ? '+' : '';
    const pctStr = pct !== null ? ` (${pct > 0 ? '+' : ''}${pct}%)` : '';
    const cls = diff > 0 ? 'diff-up' : diff < 0 ? 'diff-down' : 'diff-zero';
    return `<span class="${cls}">${sign}${diff}${pctStr}</span>`;
  }

  async function load() {
    const btn = document.getElementById('refresh');
    btn.disabled = true;

    try {
      const res = await fetch('/api/data');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (!data.current) {
        document.getElementById('count-val').textContent = '—';
        document.getElementById('count-meta').textContent = 'No data yet. Trigger /api/cron to seed day 1.';
        document.getElementById('diff-body').innerHTML = '<tr><td colspan="3" class="diff-na" style="text-align:center;padding:1rem 0">Waiting for first snapshot…</td></tr>';
        return;
      }

      document.getElementById('count-val').textContent = data.current.count.toLocaleString();
      document.getElementById('count-meta').innerHTML =
        `As of ${fmtDate(data.current.date)} &nbsp;·&nbsp; ${data.total_snapshots} snapshot${data.total_snapshots !== 1 ? 's' : ''}`;

      document.getElementById('diff-body').innerHTML = data.diffs.map(d => `
        <tr>
          <td class="window-label">${d.label}</td>
          <td>${d.baseline_date ? `${d.baseline_count?.toLocaleString()} <span style="color:#444;font-size:0.75rem">(${fmtDate(d.baseline_date)})</span>` : '<span class="diff-na">—</span>'}</td>
          <td>${fmtDiff(d.diff, d.pct)}</td>
        </tr>`).join('');

    } catch (e) {
      document.getElementById('count-val').innerHTML = '<span class="error-msg">Failed to load</span>';
      document.getElementById('diff-body').innerHTML = `<tr><td colspan="3" class="error-msg">${e.message}</td></tr>`;
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('refresh').addEventListener('click', load);
  load();
</script>
</body>
</html>
