<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Ads Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .wrap { max-width: 1100px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .brand {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    button {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.78rem;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: inherit;
    }
    button:hover { border-color: #666; color: #eee; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.primary { border-color: #4a5; color: #cfd; }
    button.primary:hover { background: #1a2a1a; }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th {
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      padding: 0 0.5rem 0.75rem;
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }
    th.num, td.num { text-align: right; }
    td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid #1a1a1a;
      color: #bbb;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #181818; }

    .target-name { color: #e8e8e8; font-weight: 500; }
    .target-id   { color: #555; font-size: 0.72rem; font-family: ui-monospace, monospace; }

    .count-big { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .count-date { color: #555; font-size: 0.72rem; }

    .diff-up   { color: #4ade80; font-weight: 600; }
    .diff-down { color: #f87171; font-weight: 600; }
    .diff-zero { color: #666; }
    .diff-na   { color: #333; font-style: italic; }

    td.actions { width: 1%; white-space: nowrap; text-align: right; }

    .skeleton {
      display: inline-block;
      background: #222;
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
      width: 50px; height: 0.9rem;
    }
    @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }

    details.errors summary {
      cursor: pointer;
      user-select: none;
      list-style: none;
      color: #888;
      font-size: 0.78rem;
    }
    details.errors summary::-webkit-details-marker { display: none; }
    details.errors[open] summary { margin-bottom: 0.75rem; color: #ccc; }
    .err-row {
      padding: 0.6rem 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.8rem;
      font-family: ui-monospace, monospace;
    }
    .err-row:last-child { border-bottom: none; }
    .err-meta { color: #666; font-size: 0.72rem; margin-bottom: 0.25rem; }
    .err-msg  { color: #f87171; word-break: break-word; white-space: pre-wrap; }

    .flash { color: #4ade80; font-size: 0.75rem; margin-left: 0.5rem; }
    .flash.err { color: #f87171; }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #333;
      text-align: center;
      line-height: 1.7;
    }
    footer a { color: #555; }
  </style>
</head>
<body>
<div class="wrap">

<header>
  <span class="brand">FB Ads Monitor</span>
  <div>
    <button id="force-all" title="Scrape all targets now (ignores schedule)">⚡ Force run all</button>
    <button id="refresh">↻ Refresh</button>
  </div>
</header>

<div class="card">
  <h2>Active ads (HK) per target</h2>
  <table>
    <thead>
      <tr>
        <th>Target</th>
        <th class="num">Current</th>
        <th class="num">1d</th>
        <th class="num">7d</th>
        <th class="num">30d</th>
        <th class="num">90d</th>
        <th class="num">365d</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#555">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="card">
  <details class="errors" id="errors-details">
    <summary>
      <span id="errors-summary">Recent errors — loading…</span>
    </summary>
    <div id="errors-body"></div>
  </details>
</div>

<footer>
  Daily cron UTC 17:00 (HKT 01:00) &nbsp;·&nbsp;
  Source: <a href="https://www.facebook.com/ads/library/" target="_blank">Meta Ad Library</a>
  &nbsp;·&nbsp; <span id="gen-at"></span>
</footer>

</div><!-- /wrap -->

<script>
  const fmtNum = (n) => n === null || n === undefined ? '—' : n.toLocaleString();
  const fmtDate = (d) => {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y.slice(2)}`;
  };

  function fmtDiffCell(d) {
    if (!d || d.diff === null || d.diff === undefined) {
      return '<span class="diff-na">—</span>';
    }
    const sign = d.diff > 0 ? '+' : '';
    const pctStr = d.pct !== null && d.pct !== undefined
      ? ` <span style="opacity:0.65">(${d.pct > 0 ? '+' : ''}${d.pct}%)</span>`
      : '';
    const cls = d.diff > 0 ? 'diff-up' : d.diff < 0 ? 'diff-down' : 'diff-zero';
    return `<span class="${cls}">${sign}${d.diff}${pctStr}</span>`;
  }

  function renderRow(t) {
    const diffsByLabel = Object.fromEntries((t.diffs || []).map((d) => [d.label, d]));
    const adLib = `https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=HK&view_all_page_id=${t.id}`;
    const current = t.current
      ? `<div class="count-big">${fmtNum(t.current.count)}</div>
         <div class="count-date">${fmtDate(t.current.date)}</div>`
      : `<div class="diff-na">no data</div>`;
    return `
      <tr data-id="${t.id}">
        <td>
          <div class="target-name">
            <a href="${adLib}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted #333">${t.name}</a>
          </div>
          <div class="target-id">${t.id}</div>
        </td>
        <td class="num">${current}</td>
        <td class="num">${fmtDiffCell(diffsByLabel.Daily)}</td>
        <td class="num">${fmtDiffCell(diffsByLabel.Weekly)}</td>
        <td class="num">${fmtDiffCell(diffsByLabel.Monthly)}</td>
        <td class="num">${fmtDiffCell(diffsByLabel.Quarterly)}</td>
        <td class="num">${fmtDiffCell(diffsByLabel.Yearly)}</td>
        <td class="actions">
          <button class="fetch-btn" data-id="${t.id}" data-name="${t.name.replace(/"/g, '&quot;')}">
            ↻ Fetch now
          </button>
          <span class="flash" data-flash="${t.id}"></span>
        </td>
      </tr>`;
  }

  function renderErrors(errors) {
    const summary = document.getElementById('errors-summary');
    const body = document.getElementById('errors-body');
    if (!errors || errors.length === 0) {
      summary.textContent = 'Recent errors — none ✨';
      body.innerHTML = '';
      return;
    }
    summary.textContent = `Recent errors — ${errors.length}`;
    body.innerHTML = errors.map((e) => `
      <div class="err-row">
        <div class="err-meta">
          ${new Date(e.ts).toLocaleString()} ·
          ${e.name || '(no target)'} ·
          ${e.page_id || ''} ·
          stage: ${e.stage || '?'}
          ${e.took_ms ? ` · ${e.took_ms}ms` : ''}
        </div>
        <div class="err-msg">${(e.error || '').toString().replace(/</g, '&lt;')}</div>
      </div>
    `).join('');
  }

  async function fetchData() {
    const res = await fetch(`/api/data?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function load() {
    const btn = document.getElementById('refresh');
    btn.disabled = true;
    try {
      const data = await fetchData();
      document.getElementById('rows').innerHTML =
        (data.targets || []).map(renderRow).join('') ||
        '<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#555">No targets configured</td></tr>';
      renderErrors(data.errors || []);
      document.getElementById('gen-at').textContent =
        data.generated_at ? `Updated ${new Date(data.generated_at).toLocaleTimeString()}` : '';
    } catch (e) {
      document.getElementById('rows').innerHTML =
        `<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#f87171">Failed to load: ${e.message}</td></tr>`;
    } finally {
      btn.disabled = false;
    }
  }

  // Refresh just the errors panel without touching the rows table — so the
  // inline flash message next to the Fetch button stays visible.
  async function loadErrors() {
    try {
      const data = await fetchData();
      renderErrors(data.errors || []);
    } catch { /* silent — flash already shows the failure */ }
  }

  function flash(id, msg, isErr) {
    const el = document.querySelector(`[data-flash="${id}"]`);
    if (!el) return;
    el.textContent = msg;
    el.className = 'flash' + (isErr ? ' err' : '');
    if (!isErr) setTimeout(() => { el.textContent = ''; }, 4000);
  }

  async function fetchOne(id, name, btn) {
    btn.disabled = true;
    btn.textContent = '… fetching';
    flash(id, '');
    let ok = false;
    try {
      const res = await fetch(`/api/trigger?id=${encodeURIComponent(id)}`, { method: 'POST' });
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || body.detail || `HTTP ${res.status}`);
      flash(id, `✓ ${body.count} (${(body.tookMs / 1000).toFixed(1)}s)`);
      ok = true;
    } catch (e) {
      flash(id, `✗ ${e.message}`, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Fetch now';
      // On success we reload everything (count changed). On failure we
      // only refresh the errors panel so the inline flash survives.
      (ok ? load() : loadErrors()).catch(() => {});
    }
  }

  async function forceAll(btn) {
    if (!confirm('Scrape ALL targets right now? This takes a minute or two.')) return;
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = '… running';
    try {
      const res = await fetch('/api/cron?force=1');
      const body = await res.json();
      if (res.status >= 500) throw new Error(body.error || `HTTP ${res.status}`);
      alert(`Done.\nScraped: ${body.scraped}\nOK: ${body.ok}\nFailed: ${body.failed}`);
      await load();
    } catch (e) {
      alert('Force run failed: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  }

  document.getElementById('refresh').addEventListener('click', load);
  document.getElementById('force-all').addEventListener('click', (e) => forceAll(e.currentTarget));
  document.getElementById('rows').addEventListener('click', (e) => {
    const btn = e.target.closest('.fetch-btn');
    if (!btn) return;
    fetchOne(btn.dataset.id, btn.dataset.name, btn);
  });
  load();
</script>
</body>
</html>
