# Render blueprint — single web service on the free plan. The daily
# scrape is triggered by a GitHub Actions workflow (see
# .github/workflows/daily-scrape.yml) that hits /api/cron?force=1.
#
# Render's Cron Job service type requires a paid plan; using GHA keeps
# everything on the free tier.
#
# After first deploy, set UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN
# in the service's Environment Variables (declared `sync: false` so they
# are NOT committed to git).

services:
  - type: web
    name: fb-ads-monitor
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: RENDER
        value: "true"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
