name: Staging — Weekly creatives + report (manual)

# Manual-trigger only on staging. Validates the weekly creative scraper,
# landing-page screenshot diff, and AI report end-to-end against the
# staging Render service before we wire this up on production.
on:
  workflow_dispatch:
    inputs:
      max_ads_per_target:
        description: 'Max ads to capture per target'
        required: false
        default: '50'

permissions:
  contents: write   # so the workflow can commit baseline screenshots back

concurrency:
  group: staging-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install diff dependencies
        run: npm install --no-save pixelmatch@^5.3.0 pngjs@^7.0.0

      - name: Wake up Render staging
        env:
          RENDER_URL: ${{ secrets.STAGING_RENDER_URL }}
        run: |
          echo "Waking up staging Render..."
          curl --fail --show-error -s --max-time 120 --retry 2 --retry-delay 10 \
            -o /dev/null -w "Wake up: HTTP %{http_code} in %{time_total}s\n" \
            "${RENDER_URL%/}"
          sleep 10

      - name: Scrape creatives for all 13 targets
        env:
          RENDER_URL: ${{ secrets.STAGING_RENDER_URL }}
          MAX_ADS: ${{ github.event.inputs.max_ads_per_target || '50' }}
        run: |
          TARGETS=(
            "110379081699089|HKMPM (original)"
            "89863844963|NYMG"
            "389829531491007|HK Pain Tech"
            "172307579523899|德善健康管理"
            "117604888113796|悟空的心情"
            "103624385951092|新希望"
            "106527928198209|CO Health Care"
            "115283196839127|inlife"
            "103907508885531|Swisso Health"
            "624480124596923|Excel Medical Group"
            "101464375049675|菁森日本理療所"
            "107468998477970|Perle signature"
            "111895960717990|Me Paincare"
          )

          OK=0
          FAIL=0

          for entry in "${TARGETS[@]}"; do
            ID="${entry%%|*}"
            NAME="${entry##*|}"
            echo ""
            echo "=== [$NAME] (ID: $ID) ==="

            # 10 minute timeout per target — creatives scrape is heavier.
            if curl -X POST --fail --show-error --max-time 600 \
              "${RENDER_URL%/}/api/scrape-creatives?id=${ID}&max=${MAX_ADS}" 2>&1; then
              echo ""
              echo ">>> OK"
              OK=$((OK + 1))
            else
              echo ""
              echo ">>> FAILED (skipping)"
              FAIL=$((FAIL + 1))
            fi

            echo "Sleeping 30s before next target..."
            sleep 30
          done

          echo ""
          echo "========== STAGING WEEKLY SUMMARY =========="
          echo "OK: $OK / $((OK + FAIL))"
          echo "Failed: $FAIL / $((OK + FAIL))"
          true

      - name: Screenshot + diff new landing pages
        id: diffs
        if: success() || failure()
        env:
          RENDER_URL: ${{ secrets.STAGING_RENDER_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          node scripts/screenshot-diff.js
          echo "have_diffs=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated screenshots back to staging
        if: steps.diffs.outputs.have_diffs == 'true'
        run: |
          if [ -n "$(git status --porcelain screenshots/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add screenshots/
            COUNT=$(git diff --cached --name-only screenshots/ | wc -l | tr -d ' ')
            git commit -m "chore(screenshots): update ${COUNT} landing pages [skip ci]"
            git push origin staging
          else
            echo "No screenshot changes to commit."
          fi

      - name: Generate AI weekly report
        id: report
        if: success() || failure()
        env:
          RENDER_URL: ${{ secrets.STAGING_RENDER_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          mkdir -p /tmp/report
          DIFFS_JSON='[]'
          if [ -f /tmp/landing-diffs.json ]; then
            DIFFS_JSON=$(cat /tmp/landing-diffs.json)
          fi
          BODY=$(jq -n --argjson diffs "$DIFFS_JSON" '{landing_diffs: $diffs}')

          echo "Calling /api/admin/weekly-report ..."
          HTTP_CODE=$(curl -X POST -s -o /tmp/report/report.json -w "%{http_code}" \
            --max-time 120 \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "${RENDER_URL%/}/api/admin/weekly-report?token=${ADMIN_TOKEN}")
          echo "HTTP $HTTP_CODE"
          echo "--- Response (first 500 chars) ---"
          head -c 500 /tmp/report/report.json
          echo ""
          echo "----------------------------------"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Report generation failed."
            echo "have_report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          WEEK=$(jq -r '.week // "?"' /tmp/report/report.json)
          NEW_TOTAL=$(jq -r '.stats.new_total // 0' /tmp/report/report.json)
          MOST_NEW_NAME=$(jq -r '.stats.most_new.name // "—"' /tmp/report/report.json)
          MOST_NEW_COUNT=$(jq -r '.stats.most_new.count // 0' /tmp/report/report.json)

          jq -r '.html // ""' /tmp/report/report.json > /tmp/report/body.html
          if [ ! -s /tmp/report/body.html ]; then
            echo "AI returned empty body."
            echo "have_report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "have_report=true"
            echo "week=$WEEK"
            echo "new_total=$NEW_TOTAL"
            echo "subject=[FB Ads Staging] 週報 $WEEK — 新增 $NEW_TOTAL 個廣告，$MOST_NEW_NAME 最活躍 (+$MOST_NEW_COUNT)"
          } >> "$GITHUB_OUTPUT"

      - name: Check email secrets
        id: check_email
        env:
          G_USER: ${{ secrets.GMAIL_USER }}
          G_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          G_TO: ${{ secrets.ALERT_EMAIL }}
        run: |
          if [ -n "$G_USER" ] && [ -n "$G_PASS" ] && [ -n "$G_TO" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping email — one of GMAIL_USER / GMAIL_APP_PASSWORD / ALERT_EMAIL secrets is missing."
          fi

      - name: Send weekly report email
        if: steps.report.outputs.have_report == 'true' && steps.check_email.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: FB Ads Monitor <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: ${{ steps.report.outputs.subject }}
          html_body: file:///tmp/report/body.html
          convert_markdown: false
