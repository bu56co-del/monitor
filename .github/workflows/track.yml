name: Daily FB Ads count

on:
  schedule:
    # 02:15 UTC = 10:15 HKT. Comfortably past midnight in both zones.
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Setup Python
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch count and update history
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          set -eo pipefail
          count=$(python scripts/fetch_count.py)
          echo "Fetched count: $count"
          echo "$count" | python scripts/update_history.py

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Commit and push
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.csv REPORT.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily FB Ads count snapshot"
          # Retry push with exponential backoff on transient network errors.
          for delay in 0 2 4 8 16; do
            [ "$delay" -gt 0 ] && sleep "$delay"
            if git push origin HEAD; then
              exit 0
            fi
          done
          echo "Push failed after retries." >&2
          exit 1
