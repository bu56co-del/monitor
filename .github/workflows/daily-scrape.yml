name: Daily Ad Library Scrape

on:
  schedule:
    # HKT 21:00–08:00 (= UTC 13:00–00:00), one target per hour
    - cron: "0 13-23 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:          # manual = scrape ALL targets at once

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wake up Render
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          echo "Waking up Render (cold start may take ~60s)..."
          curl -s --max-time 120 --retry 2 --retry-delay 10 "$RENDER_URL" > /dev/null
          echo "Render is awake."

      - name: Scrape targets
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          GITHUB_EVENT: ${{ github.event_name }}
        run: |
          set -eo pipefail

          # All 12 targets (same order as lib/targets.js)
          TARGETS=(
            110379081699089    # 0  HKMPM (original)
            89863844963        # 1  NYMG
            389829531491007    # 2  HK Pain Tech
            172307579523899    # 3  德善健康管理
            117604888113796    # 4  悟空的心情
            103624385951092    # 5  新希望
            106527928198209    # 6  CO Health Care
            115283196839127    # 7  inlife
            103907508885531    # 8  Swisso Health
            624480124596923    # 9  Excel Medical Group
            101464375049675    # 10 菁森日本理療所
            107468998477970    # 11 Perle signature
          )

          # Manual dispatch → scrape all 12
          if [ "$GITHUB_EVENT" = "workflow_dispatch" ]; then
            echo "Manual trigger — scraping all ${#TARGETS[@]} targets"
            INDICES=($(seq 0 11))
          else
            # Scheduled: map UTC hour → 1 target
            # UTC 13 = HKT 21 → 0
            # UTC 14 = HKT 22 → 1
            # UTC 15 = HKT 23 → 2
            # UTC 16 = HKT 00 → 3
            # UTC 17 = HKT 01 → 4
            # UTC 18 = HKT 02 → 5
            # UTC 19 = HKT 03 → 6
            # UTC 20 = HKT 04 → 7
            # UTC 21 = HKT 05 → 8
            # UTC 22 = HKT 06 → 9
            # UTC 23 = HKT 07 → 10
            # UTC 0  = HKT 08 → 11
            HOUR=$(date -u +%-H)
            case $HOUR in
              13) INDICES=(0) ;;
              14) INDICES=(1) ;;
              15) INDICES=(2) ;;
              16) INDICES=(3) ;;
              17) INDICES=(4) ;;
              18) INDICES=(5) ;;
              19) INDICES=(6) ;;
              20) INDICES=(7) ;;
              21) INDICES=(8) ;;
              22) INDICES=(9) ;;
              23) INDICES=(10) ;;
              0)  INDICES=(11) ;;
              *)  echo "Outside scrape window (UTC $HOUR), skipping."; exit 0 ;;
            esac
            echo "UTC $HOUR → scraping target ${INDICES[0]}"
          fi

          for i in "${INDICES[@]}"; do
            ID="${TARGETS[$i]}"
            echo "--- Target $i (ID: $ID) ---"
            curl --fail --show-error --max-time 180 --retry 1 \
              "${RENDER_URL}/api/trigger?id=${ID}"
            echo ""
            if [ "$i" != "${INDICES[-1]}" ]; then sleep 10; fi
          done

          echo "Done."
