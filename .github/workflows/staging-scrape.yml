name: Staging — Scrape all (manual)

# Manual-trigger only. Never runs on schedule.
# Hits the staging Render service via STAGING_RENDER_URL secret.
on:
  workflow_dispatch:

concurrency:
  group: staging-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Wake up Render staging
        env:
          RENDER_URL: ${{ secrets.STAGING_RENDER_URL }}
        run: |
          echo "Waking up staging Render (cold start may take ~60s)..."
          curl --fail --show-error -s --max-time 120 --retry 2 --retry-delay 10 \
            -o /dev/null -w "Wake up: HTTP %{http_code} in %{time_total}s\n" \
            "${RENDER_URL%/}"
          echo "Staging is awake. Waiting 10s before starting..."
          sleep 10

      - name: Scrape all targets one by one (against staging)
        env:
          RENDER_URL: ${{ secrets.STAGING_RENDER_URL }}
        run: |
          # All 13 targets (same order as lib/targets.js)
          TARGETS=(
            "110379081699089|HKMPM (original)"
            "89863844963|NYMG"
            "389829531491007|HK Pain Tech"
            "172307579523899|德善健康管理"
            "117604888113796|悟空的心情"
            "103624385951092|新希望"
            "106527928198209|CO Health Care"
            "115283196839127|inlife"
            "103907508885531|Swisso Health"
            "624480124596923|Excel Medical Group"
            "101464375049675|菁森日本理療所"
            "107468998477970|Perle signature"
            "111895960717990|Me Paincare"
          )

          OK=0
          FAIL=0

          for entry in "${TARGETS[@]}"; do
            ID="${entry%%|*}"
            NAME="${entry##*|}"
            echo ""
            echo "=== [$NAME] (ID: $ID) ==="

            # 2 minute timeout per target — skip if stuck
            if curl -X POST --fail --show-error --max-time 120 \
              "${RENDER_URL%/}/api/trigger?id=${ID}" 2>&1; then
              echo ""
              echo ">>> OK"
              OK=$((OK + 1))
            else
              echo ""
              echo ">>> FAILED (skipping)"
              FAIL=$((FAIL + 1))
            fi

            echo "Waiting 90s before next target..."
            sleep 90
          done

          echo ""
          echo "========== STAGING SUMMARY =========="
          echo "OK: $OK / $((OK + FAIL))"
          echo "Failed: $FAIL / $((OK + FAIL))"

          # Manual trigger — do not exit nonzero (lets us inspect partial results)
          true
